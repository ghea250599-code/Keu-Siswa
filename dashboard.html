<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan Sekolah</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; display: flex; background-color: #f4f5fc; }
        .sidebar { width: 250px; background-color: #1e293b; color: white; min-height: 100vh; padding: 20px 10px; box-sizing: border-box; }
        .sidebar h2 { text-align: center; font-size: 20px; margin-bottom: 30px; color: #38bdf8; }
        .sidebar a { display: block; color: #cbd5e1; padding: 12px; text-decoration: none; border-radius: 5px; margin-bottom: 5px; }
        .sidebar a:hover, .sidebar a.active { background-color: #334155; color: white; }
        .main-content { flex: 1; padding: 30px; box-sizing: border-box; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; font-size: 14px; text-decoration: none; }
        .btn-green { background-color: #22c55e; }
        .btn-blue { background-color: #3b82f6; }
        .btn-orange { background-color: #f97316; }
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #64748b; }
        #input-file-excel { display: none; } /* Hidden input untuk file */
    </style>
</head>
<body>

<div class="sidebar">
    <h2 id="nama-sekolah-title">Loading...</h2>
    <a href="#" class="active">Data Siswa</a>
    <a href="#">Kontrol Kelas</a>
    <a href="#">Rekap Tagihan</a>
    <a href="index.html" class="btn-orange" style="margin-top: 50px; text-align: center;">← Ganti Jenjang</a>
</div>

<div class="main-content">
    <div class="header-section">
        <h1 id="dashboard-title">Data Siswa</h1>
        <div class="btn-group">
            <button class="btn btn-blue" onclick="tambahSiswa Manual()">+ Tambah Siswa</button>
            
            <button class="btn btn-green" id="btn-import-excel">Import Excel Siswa</button>
            <input type="file" id="input-file-excel" accept=".xlsx, .xls, .csv">
            
            <button class="btn btn-green">Download Excel</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>No Virtual</th>
                    <th>Kelas</th>
                    <th>Tarif Bulanan</th>
                    <th>Bulan</th>
                    <th>Total Uang Sekolah</th>
                </tr>
            </thead>
            <tbody id="tabel-siswa-body">
                <tr>
                    <td colspan="6" style="text-align: center; color: #94a3b8;">Belum ada data. Silakan import file Excel.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. MENDAPATKAN JENJANG AKTIF DARI URL
    const urlParams = new URLSearchParams(window.location.search);
    const jenjangSiswa = urlParams.get('jenjang') || 'tk'; // Default ke 'tk' jika param kosong
    
    // Nama Database khusus per jenjang agar tidak bercampur
    const DB_NAME = `database_siswa_${jenjangSiswa}`;

    // 2. MENYESUAIKAN TAMPILAN TEXT BERDASARKAN JENJANG
    const namaSekolahTitle = document.getElementById('nama-sekolah-title');
    const dashboardTitle = document.getElementById('dashboard-title');
    if(namaSekolahTitle) namaSekolahTitle.innerText = `TK Damai (${jenjangSiswa.toUpperCase()})`;
    if(dashboardTitle) dashboardTitle.innerText = `Data Siswa - Jenjang ${jenjangSiswa.toUpperCase()}`;

    // 3. FUNGSI MENAMPILKAN DATA KE TABEL
    function renderDataTabel() {
        const tabelBody = document.getElementById('tabel-siswa-body');
        if (!tabelBody) return;

        // Ambil data dari localStorage sesuai jenjang aktif
        const dataLokal = localStorage.getItem(DB_NAME);
        const listSiswa = dataLokal ? JSON.parse(dataLokal) : [];

        if (listSiswa.length === 0) {
            tabelBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #94a3b8;">Belum ada data. Silakan import file Excel.</td></tr>`;
            return;
        }

        let html = '';
        listSiswa.forEach(siswa => {
            html += `
                <tr>
                    <td>${siswa.Nama || siswa.nama || '-'}</td>
                    <td>${siswa['No Virtual'] || siswa.no_virtual || '-'}</td>
                    <td>${siswa.Kelas || siswa.kelas || '-'}</td>
                    <td>${siswa['Tarif Bulanan'] || siswa.tarif_bulanan || 0}</td>
                    <td>${siswa.Bulan || siswa.bulan || '-'}</td>
                    <td>${siswa['Total Uang Sekolah'] || siswa.total_uang_sekolah || 0}</td>
                </tr>
            `;
        });
        tabelBody.innerHTML = html;
    }

    // 4. PROSES IMPORT FILE EXCEL
    const btnImport = document.getElementById('btn-import-excel');
    const inputFile = document.getElementById('input-file-excel');

    if (btnImport && inputFile) {
        // Ketika tombol hijau diklik, trigger input file bawaan browser
        btnImport.addEventListener('click', function() {
            inputFile.click();
        });

        // Ketika user selesai memilih file Excel
        inputFile.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                
                // Ambil sheet pertama di file Excel
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                
                // Konversi isi sheet menjadi format JSON Array
                const jsonResult = XLSX.utils.sheet_to_json(worksheet);

                if(jsonResult.length > 0) {
                    // Simpan data ke dalam database spesifik jenjang saat ini
                    localStorage.setItem(DB_NAME, JSON.stringify(jsonResult));
                    alert(`Berhasil mengimport ${jsonResult.length} data siswa untuk jenjang ${jenjangSiswa.toUpperCase()}!`);
                    renderDataTabel(); // Refresh tabel
                } else {
                    alert("File Excel kosong atau format tidak sesuai.");
                }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    // Jalankan render data saat halaman pertama kali dibuka
    window.onload = renderDataTabel;

    // Dummy fungsi tambah manual
    function tambahSiswaManual() {
        alert("Fitur tambah manual diklik. Gunakan tombol 'Import Excel Siswa' untuk mengupload file.");
    }
</script>

</body>
</html>
