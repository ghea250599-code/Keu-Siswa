<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi Keuangan Siswa</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #3498db;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #7f8c8d;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #3498db;
            outline: none;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #2980b9;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: #7f8c8d;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn-register:hover {
            background: #95a5a6;
        }
        .links {
            margin-top: 20px;
            font-size: 13px;
        }
        .links a {
            color: #3498db;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2 id="login-title">Aplikasi Keuangan Siswa</h2>
    <form id="loginForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="admin" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="123456" required>
        </div>
        <button type="submit" class="btn-login">Login</button>
        <button type="button" class="btn-register" onclick="handleRegister()">Register</button>
    </form>
    <div class="links">
        <a href="#" onclick="alert('Hubungi admin sekolah untuk mereset password Anda.')">Lupa Password?</a>
    </div>
</div>

<script>
    // Ambil jenjang dari URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const jenjang = urlParams.get('jenjang') || 'tk';

    // Sesuaikan judul berdasarkan jenjang
    document.getElementById('login-title').innerText = `Aplikasi Keuangan Siswa (${jenjang.toUpperCase()})`;

    // Handle Login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Login sederhana (bisa diganti dengan autentikasi asli nantinya)
        if (user === 'admin' && pass === '123456') {
            window.location.href = `dashboard.html?jenjang=${jenjang}`;
        } else {
            alert('Username atau Password salah! (Gunakan admin / 123456)');
        }
    });

    // Handle Alert Registrasi seperti di gambar ke-5
    function handleRegister() {
        alert("Fitur Registrasi berhasil merespons! Silakan hubungi Administrator untuk pembuatan akun baru.");
    }
</script>
</body>
</html>
