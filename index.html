<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi Keuangan Siswa</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            background-color: #4c8bf5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-container { 
            background: white; 
            padding: 35px 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 360px; 
            text-align: center; 
            box-sizing: border-box;
        }
        h2 { 
            color: #333; 
            margin-bottom: 25px; 
            font-size: 22px; 
        }
        .input-group { 
            text-align: left; 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            color: #666; 
            font-size: 14px; 
            font-weight: bold; 
        }
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px; 
        }
        .btn-login { 
            width: 100%; 
            padding: 12px; 
            background-color: #3b71ca; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: bold; 
            margin-top: 10px; 
            display: block;
        }
        .btn-login:hover { 
            background-color: #28509e; 
        }
        .btn-register { 
            width: 100%; 
            padding: 10px; 
            background-color: #6c757d; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px; 
            margin-top: 8px; 
            display: block;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-register:hover { 
            background-color: #5a6268; 
        }
        .forgot-password-link {
            display: inline-block;
            margin-top: 15px;
            font-size: 13px;
            color: #3b71ca;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-password-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Aplikasi Keuangan Siswa</h2>
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" value="admin" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" value="123456" required>
        </div>
        <button type="submit" class="btn-login">Login</button>
        
        <button type="button" class="btn-register" onclick="handleRegister()">Register</button>
    </form>

    <a href="#" class="forgot-password-link" onclick="handleForgotPassword(event)">Lupa Password?</a>
</div>

<script>
    // Ganti email ini dengan email administrator sekolah Anda
    const ADMIN_EMAIL = "admin.keuangan@sekolahanda.sch.id";

    function handleLogin(event) {
        event.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (user === "admin" && pass === "123456") {
            // Mengarahkan ke halaman jenjang jika login benar
            window.location.href = "jenjang.html";
        } else {
            alert("Username atau Password salah! Gunakan username: 'admin' dan password: '123456'");
        }
    }

    // Fungsi Registrasi Baru via Email
    function handleRegister() {
        const subject = encodeURIComponent("Permohonan Pembuatan Akun Baru - Aplikasi Keuangan Siswa");
        const body = encodeURIComponent(
            "Halo Admin,\n\n" +
            "Saya ingin mengajukan permohonan pembuatan akun baru untuk Aplikasi Keuangan Siswa.\n\n" +
            "Berikut data diri saya:\n" +
            "- Nama Lengkap: \n" +
            "- Jabatan/Peran: \n" +
            "- Username yang Diinginkan: \n" +
            "- No. Handphone aktif: \n\n" +
            "Mohon segera diproses. Terima kasih."
        );
        
        // Membuka email client bawaan sistem pengguna
        window.location.href = `mailto:${ADMIN_EMAIL}?subject=${subject}&body=${body}`;
    }

    // Fungsi Lupa Password via Email
    function handleForgotPassword(event) {
        event.preventDefault(); // Mencegah reload halaman
        
        const subject = encodeURIComponent("Permintaan Reset Password - Aplikasi Keuangan Siswa");
        const body = encodeURIComponent(
            "Halo Admin,\n\n" +
            "Saya mengalami kendala lupa password saat ingin masuk ke aplikasi.\n\n" +
            "Mohon bantuan untuk melakukan reset password akun berikut:\n" +
            "- Username Akun: \n" +
            "- Nama Lengkap: \n" +
            "- Jenjang Sekolah: \n\n" +
            "Terima kasih."
        );

        // Membuka email client bawaan sistem pengguna
        window.location.href = `mailto:${ADMIN_EMAIL}?subject=${subject}&body=${body}`;
    }
</script>
</body>
</html>
