<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi Keuangan Siswa</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            background-color: #4c8bf5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-container { 
            background: white; 
            padding: 35px 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 360px; 
            text-align: center; 
            box-sizing: border-box;
        }
        h2 { color: #333; margin-bottom: 25px; font-size: 22px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        .btn-login { 
            width: 100%; padding: 12px; background-color: #3b71ca; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-size: 14px; 
            font-weight: bold; margin-top: 10px; display: block;
        }
        .btn-login:hover { background-color: #28509e; }
        
        .btn-register { 
            width: 100%; padding: 10px; background-color: #6c757d; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-size: 14px; 
            margin-top: 8px; display: block; text-decoration: none; box-sizing: border-box;
        }
        .btn-register:hover { background-color: #5a6268; }
        
        .forgot-password-link {
            display: inline-block; margin-top: 15px; font-size: 13px; 
            color: #3b71ca; text-decoration: none; font-weight: 500; cursor: pointer;
        }
        .forgot-password-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Aplikasi Keuangan Siswa</h2>
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" value="admin" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" value="123456" required>
        </div>
        <button type="submit" class="btn-login">Login</button>
        
        <a href="mailto:admin.keuangan@sekolahanda.sch.id?subject=Permohonan%20Pembuatan%20Akun%20Baru&body=Halo%20Admin%2C%0A%0ASaya%20ingin%20mengajukan%20permohonan%20akun%20baru.%0A%0ANama%20Lengkap%3A%20%0AJabatan%3A%20" class="btn-register">Register</a>
    </form>

    <a href="mailto:admin.keuangan@sekolahanda.sch.id?subject=Permintaan%20Reset%20Password&body=Halo%20Admin%2C%0A%0AMohon%20bantuan%20untuk%20reset%20password%20akun%20saya.%0A%0AUsername%3A%20" class="forgot-password-link">Lupa Password?</a>
</div>

<script>
    function handleLogin(event) {
        event.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Validasi login statis
        if (user === "admin" && pass === "123456") {
            window.location.href = "jenjang.html"; // Mengarah ke halaman pilih jenjang
        } else {
            alert("Username atau Password salah! (Default: admin / 123456)");
        }
    }
</script>
</body>
</html>
