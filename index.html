<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Jenjang Sekolah</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f6f9; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 30px; }
        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 15px 30px; font-size: 18px; color: white; background-color: #34495e; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn:hover { background-color: #2c3e50; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h1>Pilih Jenjang Sekolah</h1>
    <div class="btn-group">
        <!-- Semua tombol ini akan mengarah ke halaman dashboard yang tadi di-rename -->
        <a href="dashboard.html?jenjang=tk" class="btn">TK</a>
        <a href="dashboard.html?jenjang=sd" class="btn">SD</a>
        <a href="dashboard.html?jenjang=smp" class="btn">SMP</a>
        <a href="dashboard.html?jenjang=sma" class="btn">SMA</a>
    </div>
</div>

</body>
</html>
