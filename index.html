<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Jenjang Sekolah - MyAKA v7</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f4f6f9; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            background: white; 
            padding: 50px 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            max-width: 500px;
            width: 100%;
        }
        h1 { 
            color: #2c3e50; 
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 40px;
            font-size: 16px;
        }
        .btn-group { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        .btn { 
            flex: 1 1 120px;
            padding: 15px; 
            font-size: 16px; 
            color: white; 
            background-color: #34495e; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none; 
            font-weight: bold; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover { 
            background-color: #1abc9c; 
            transform: translateY(-3px); 
            box-shadow: 0 6px 12px rgba(26, 188, 156, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pilih Jenjang Sekolah</h1>
        <p>Silakan pilih tingkat pendidikan untuk masuk ke sistem keuangan</p>
        <div class="btn-group">
            <a href="login.html?jenjang=tk" class="btn">TK</a>
            <a href="login.html?jenjang=sd" class="btn">SD</a>
            <a href="login.html?jenjang=smp" class="btn">SMP</a>
            <a href="login.html?jenjang=sma" class="btn">SMA</a>
        </div>
    </div>
</body>
</html>
